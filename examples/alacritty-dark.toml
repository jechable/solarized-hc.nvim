[colors.primary]
background = '#001217'  # Very dark blue-black
foreground = '#fdf6e3'  # Light cream text

[colors.normal]
black   = '#001217'     # Very dark
red     = '#ff4757'     # Bright red
green   = '#a3e635'     # Bright green
yellow  = '#e6b000'     # Bright yellow
blue    = '#4dabf7'     # Bright blue
magenta = '#ff6bcb'     # Bright magenta
cyan    = '#22d3ee'     # Bright cyan
white   = '#eee8d5'     # Light

[colors.bright]
black   = '#0a1419'     # Slightly lighter dark
red     = '#ff6b35'     # Bright orange-red
green   = '#a3e635'     # Same bright green
yellow  = '#e6b000'     # Same bright yellow
blue    = '#4dabf7'     # Same bright blue
magenta = '#a78bfa'     # Bright violet
cyan    = '#22d3ee'     # Same bright cyan
white   = '#fdf6e3'     # Cream

[font]
size = 11.0

[font.normal]
family = "monospace"
style = "Regular"
